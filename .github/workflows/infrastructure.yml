name: Deploy Infrastructure

on:
  push:
    branches:
      - main
      - app_service
    paths:
      - 'infra/**'
      - '.github/workflows/infrastructure.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/**'
  workflow_dispatch:
    inputs:
      action:
        description: 'Terraform action to perform'
        required: true
        default: 'plan'
        type: choice
        options:
          - plan
          - apply
          - destroy
      environment:
        description: 'Environment to deploy to'
        required: true
        default: 'dev'
        type: choice
        options:
          - dev
          - staging
          - prod

env:
  TF_VERSION: 1.9.0
  WORKING_DIRECTORY: ./infra
  ARM_USE_OIDC: true
  ARM_USE_AZUREAD: true
  ARM_SKIP_PROVIDER_REGISTRATION: false

jobs:
  terraform-check:
    name: 'Terraform Validation'
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Format Check
        id: fmt
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        id: init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TERRAFORM_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TERRAFORM_STATE_STORAGE }}" \
            -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.tfstate"

      - name: Terraform Validate
        id: validate
        run: terraform validate

      - name: Comment PR - Validation Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Format and Style 🖌\`${{ steps.fmt.outcome }}\`
            #### Terraform Initialization ⚙️\`${{ steps.init.outcome }}\`
            #### Terraform Validation 🤖\`${{ steps.validate.outcome }}\`
            
            <details><summary>Validation Output</summary>
            
            \`\`\`\n
            ${{ steps.validate.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

  terraform-plan:
    name: 'Terraform Plan'
    runs-on: ubuntu-latest
    needs: terraform-check
    if: github.event_name == 'pull_request' || (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy')
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TERRAFORM_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TERRAFORM_STATE_STORAGE }}" \
            -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
            -var="resource_group_location=${{ vars.RESOURCE_GROUP_LOCATION }}" \
            -var="existing_virtual_network_resource_group_name=${{ vars.EXISTING_VNET_RG }}" \
            -var="existing_virtual_network_name=${{ vars.EXISTING_VNET_NAME }}" \
            -var="apim_subnet_prefix=${{ vars.APIM_SUBNET_PREFIX }}" \
            -var="app_service_subnet_prefix=${{ vars.APP_SERVICE_SUBNET_PREFIX }}" \
            -var="privateendpoint_subnet_prefix=${{ vars.PRIVATEENDPOINT_SUBNET_PREFIX }}" \
            -var="postgresql_admin_username=${{ vars.POSTGRESQL_ADMIN_USERNAME }}" \
            -var="apim_publisher_email=${{ vars.APIM_PUBLISHER_EMAIL }}" \
            -var="apim_publisher_name=${{ vars.APIM_PUBLISHER_NAME }}" \
            -var="ghcr_username=${{ vars.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}" \
            -no-color \
            -input=false \
            -out=tfplan
        continue-on-error: true

      - name: Comment PR - Plan Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const output = `#### Terraform Plan 📖\`${{ steps.plan.outcome }}\`
            
            <details><summary>Show Plan</summary>
            
            \`\`\`terraform\n
            ${{ steps.plan.outputs.stdout }}
            \`\`\`
            
            </details>
            
            *Pusher: @${{ github.actor }}, Action: \`${{ github.event_name }}\`, Workflow: \`${{ github.workflow }}\`*`;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })

      - name: Upload Plan
        if: steps.plan.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.WORKING_DIRECTORY }}/tfplan
          retention-days: 30

  terraform-apply:
    name: 'Terraform Apply'
    runs-on: ubuntu-latest
    needs: [terraform-check, terraform-plan]
    if: |
      (github.ref == 'refs/heads/main' && github.event_name == 'push') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply')
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TERRAFORM_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TERRAFORM_STATE_STORAGE }}" \
            -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.tfstate"

      - name: Download Plan
        if: github.event_name == 'workflow_dispatch'
        uses: actions/download-artifact@v4
        with:
          name: terraform-plan-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.WORKING_DIRECTORY }}

      - name: Terraform Apply
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            terraform apply -auto-approve tfplan
          else
            terraform apply -auto-approve \
              -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
              -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
              -var="resource_group_location=${{ vars.RESOURCE_GROUP_LOCATION }}" \
              -var="existing_virtual_network_resource_group_name=${{ vars.EXISTING_VNET_RG }}" \
              -var="existing_virtual_network_name=${{ vars.EXISTING_VNET_NAME }}" \
              -var="apim_subnet_prefix=${{ vars.APIM_SUBNET_PREFIX }}" \
              -var="app_service_subnet_prefix=${{ vars.APP_SERVICE_SUBNET_PREFIX }}" \
              -var="privateendpoint_subnet_prefix=${{ vars.PRIVATEENDPOINT_SUBNET_PREFIX }}" \
              -var="postgresql_admin_username=${{ vars.POSTGRESQL_ADMIN_USERNAME }}" \
              -var="apim_publisher_email=${{ vars.APIM_PUBLISHER_EMAIL }}" \
              -var="apim_publisher_name=${{ vars.APIM_PUBLISHER_NAME }}" \
              -var="ghcr_username=${{ vars.GHCR_USERNAME }}" \
              -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"
          fi

      - name: Terraform Output
        id: output
        run: terraform output -json > terraform-outputs.json

      - name: Upload Terraform Outputs
        uses: actions/upload-artifact@v4
        with:
          name: terraform-outputs-${{ github.event.inputs.environment || 'dev' }}
          path: ${{ env.WORKING_DIRECTORY }}/terraform-outputs.json
          retention-days: 30

  terraform-destroy:
    name: 'Terraform Destroy'
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy'
    environment: ${{ github.event.inputs.environment || 'dev' }}
    
    defaults:
      run:
        shell: bash
        working-directory: ${{ env.WORKING_DIRECTORY }}
    
    permissions:
      id-token: write
      contents: read
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: |
          terraform init \
            -backend-config="resource_group_name=${{ vars.TERRAFORM_STATE_RG }}" \
            -backend-config="storage_account_name=${{ vars.TERRAFORM_STATE_STORAGE }}" \
            -backend-config="container_name=${{ vars.TERRAFORM_STATE_CONTAINER }}" \
            -backend-config="key=${{ github.event.inputs.environment || 'dev' }}.tfstate"

      - name: Terraform Destroy
        run: |
          terraform destroy -auto-approve \
            -var="subscription_id=${{ vars.AZURE_SUBSCRIPTION_ID }}" \
            -var="resource_group_name=${{ vars.RESOURCE_GROUP_NAME }}" \
            -var="resource_group_location=${{ vars.RESOURCE_GROUP_LOCATION }}" \
            -var="existing_virtual_network_resource_group_name=${{ vars.EXISTING_VNET_RG }}" \
            -var="existing_virtual_network_name=${{ vars.EXISTING_VNET_NAME }}" \
            -var="apim_subnet_prefix=${{ vars.APIM_SUBNET_PREFIX }}" \
            -var="app_service_subnet_prefix=${{ vars.APP_SERVICE_SUBNET_PREFIX }}" \
            -var="privateendpoint_subnet_prefix=${{ vars.PRIVATEENDPOINT_SUBNET_PREFIX }}" \
            -var="postgresql_admin_username=${{ vars.POSTGRESQL_ADMIN_USERNAME }}" \
            -var="apim_publisher_email=${{ vars.APIM_PUBLISHER_EMAIL }}" \
            -var="apim_publisher_name=${{ vars.APIM_PUBLISHER_NAME }}" \
            -var="ghcr_username=${{ vars.GHCR_USERNAME }}" \
            -var="ghcr_token=${{ secrets.GHCR_TOKEN }}"
